services:
  - type: web
    name: nihongo-game
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: "base64:dGhpc2lzYXRlbXBvcmFyeWtleXBsZWFzZWNoYW5nZQ=="
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: nihongo-db
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false

databases:
  - name: nihongo-db
    plan: free
